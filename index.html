<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Labour</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- React & ReactDOM (Development version for standalone Babel) -->

  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

  <!-- Babel Standalone -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="bg-gray-50 text-gray-900">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const supabaseUrl = 'https://vwbqbjrygfwbzhzdeohe.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ3YnFianJ5Z2Z3YnpoemRlb2hlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNDc3MDksImV4cCI6MjA4OTkyMzcwOX0.hulsC-QsQM_3r0wF6GsOi_nghJ25I2kekTMymGRZY-M';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    function Sidebar({ currentMenu, setCurrentMenu, onLogout }) {
      const menuItems = [
        { id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard' },
        { id: 'books', label: 'Books', icon: 'book' },
        { id: 'members', label: 'Members', icon: 'users' },
        { id: 'loans', label: 'Active Loans', icon: 'clipboard-list' },
      ];

      return (
        <aside className="w-64 bg-white border-r border-gray-200 h-screen fixed left-0 top-0 flex flex-col shadow-sm z-10">
          <div className="h-16 flex items-center px-6 border-b border-gray-200 font-bold text-xl text-blue-600">
            <i data-lucide="library" className="mr-2"></i>
            Book Labour
          </div>
          <nav className="flex-1 px-4 py-6 space-y-1">
            {menuItems.map(item => (
              <button
                key={item.id}
                onClick={() => setCurrentMenu(item.id)}
                className={`w-full flex items-center px-4 py-3 text-sm font-medium rounded-lg transition-colors duration-150 ${currentMenu === item.id
                  ? 'bg-blue-50 text-blue-700'
                  : 'text-gray-600 hover:bg-gray-50 hover:text-gray-900'
                  }`}
              >
                <i data-lucide={item.icon} className={`w-5 h-5 mr-3 ${currentMenu === item.id ? 'text-blue-700' : 'text-gray-400'}`}></i>
                {item.label}
              </button>
            ))}
          </nav>
          <div className="p-4 border-t border-gray-200">
            <button
              onClick={onLogout}
              className="w-full flex items-center justify-center px-4 py-2 bg-red-50 text-red-600 font-medium rounded-lg hover:bg-red-100 transition shadow-sm"
            >
              <i data-lucide="log-out" className="w-4 h-4 mr-2"></i>
              Log Out
            </button>
          </div>
        </aside>
      );
    }

    function Dashboard({ books, members }) {
      const stats = [
        { label: 'Total Books', value: books.length, icon: 'book-open', color: 'text-blue-600', bg: 'bg-blue-100' },
        { label: 'Total Members', value: members.length, icon: 'users', color: 'text-green-600', bg: 'bg-green-100' },
        { label: 'Active Loans', value: books.filter(b => b.status === 'Borrowed').length, icon: 'bookmark', color: 'text-orange-600', bg: 'bg-orange-100' },
      ];

      return (
        <div className="animate-fade-in">
          <h1 className="text-2xl font-bold text-gray-900 mb-6">Dashboard</h1>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            {stats.map((stat, i) => (
              <div key={i} className="bg-white rounded-xl shadow-sm p-6 border border-gray-100 flex items-center transform transition duration-300 hover:scale-105 hover:shadow-md">
                <div className={`w-14 h-14 rounded-full flex items-center justify-center mr-4 ${stat.bg}`}>
                  <i data-lucide={stat.icon} className={`w-7 h-7 ${stat.color}`}></i>
                </div>
                <div>
                  <p className="text-sm font-medium text-gray-500">{stat.label}</p>
                  <p className="text-2xl font-bold text-gray-900">{stat.value}</p>
                </div>
              </div>
            ))}
          </div>

          <h2 className="text-xl font-bold text-gray-900 mb-4">Recent Books</h2>
          <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <table className="min-w-full divide-y divide-gray-200">
              <thead className="bg-gray-50">
                <tr>
                  <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Title</th>
                  <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Author</th>
                  <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                </tr>
              </thead>
              <tbody className="bg-white divide-y divide-gray-200">
                {books.slice(0, 4).map(book => (
                  <tr key={book.id}>
                    <td className="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{book.title}</td>
                    <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{book.author}</td>
                    <td className="px-6 py-4 whitespace-nowrap">
                      <span className={`px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${book.status === 'Available' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`}>
                        {book.status}
                      </span>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function BookForm({ initialData, onSubmit, onCancel }) {
      const [formData, setFormData] = useState(initialData || { title: '', author: '', category: '', status: 'Available' });

      const handleSubmit = (e) => {
        e.preventDefault();
        onSubmit(formData);
      };

      return (
        <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 animate-fade-in max-w-2xl">
          <h2 className="text-xl font-bold text-gray-900 mb-6">{initialData ? 'Edit Book' : 'Add New Book'}</h2>
          <form onSubmit={handleSubmit} className="space-y-5">
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">Title</label>
              <input required type="text" value={formData.title} onChange={e => setFormData({ ...formData, title: e.target.value })} className="block w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2.5 border outline-none transition" placeholder="e.g. Laskar Pelangi" />
            </div>
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">Author</label>
              <input required type="text" value={formData.author} onChange={e => setFormData({ ...formData, author: e.target.value })} className="block w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2.5 border outline-none transition" placeholder="e.g. Andrea Hirata" />
            </div>
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">Category</label>
              <input required type="text" value={formData.category} onChange={e => setFormData({ ...formData, category: e.target.value })} className="block w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2.5 border outline-none transition" placeholder="e.g. Fiction" />
            </div>
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">Status</label>
              <select value={formData.status} onChange={e => setFormData({ ...formData, status: e.target.value })} className="block w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2.5 border outline-none transition">
                <option value="Available">Available</option>
                <option value="Borrowed">Borrowed</option>
              </select>
            </div>
            <div className="flex justify-end space-x-3 pt-4">
              <button type="button" onClick={onCancel} className="px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 transition shadow-sm">Cancel</button>
              <button type="submit" className="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition shadow-sm">Save Book</button>
            </div>
          </form>
        </div>
      );
    }

    function Books({ books, setBooks }) {
      const [isFormOpen, setIsFormOpen] = useState(false);
      const [editingBook, setEditingBook] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');

      const handleAdd = () => {
        setEditingBook(null);
        setIsFormOpen(true);
      };

      const handleEdit = (book) => {
        setEditingBook(book);
        setIsFormOpen(true);
      };

      const handleDelete = async (id) => {
        if (confirm('Are you sure you want to delete this book?')) {
          await supabase.from('books').delete().eq('id', id);
          setBooks(books.filter(b => b.id !== id));
        }
      };

      const handleFormSubmit = async (bookData) => {
        if (editingBook) {
          const { error } = await supabase.from('books').update(bookData).eq('id', editingBook.id);
          if (!error) {
            setBooks(books.map(b => b.id === editingBook.id ? { ...b, ...bookData } : b));
          }
        } else {
          const { data, error } = await supabase.from('books').insert([bookData]).select().single();
          if (data) {
            setBooks([...books, data]);
          }
        }
        setIsFormOpen(false);
      };

      useEffect(() => {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      });

      if (isFormOpen) {
        return (
          <div className="animate-fade-in">
            <button onClick={() => setIsFormOpen(false)} className="mb-4 flex items-center text-sm font-medium text-gray-500 hover:text-gray-900 transition">
              <i data-lucide="arrow-left" className="w-4 h-4 mr-1"></i> Back to Catalog
            </button>
            <BookForm initialData={editingBook} onSubmit={handleFormSubmit} onCancel={() => setIsFormOpen(false)} />
          </div>
        );
      }

      const filteredBooks = books.filter(b =>
        b.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
        b.author.toLowerCase().includes(searchQuery.toLowerCase())
      );

      return (
        <div className="animate-fade-in">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
            <h1 className="text-2xl font-bold text-gray-900">Books Catalog</h1>
            <div className="flex gap-3 w-full md:w-auto">
              <div className="relative flex-1 md:w-64">
                <i data-lucide="search" className="w-4 h-4 absolute left-3 top-3 text-gray-400"></i>
                <input
                  type="text"
                  placeholder="Cari judul/penulis..."
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                  className="w-full pl-9 pr-4 py-2 border border-gray-300 rounded-lg text-sm focus:border-blue-500 focus:ring-blue-500 outline-none"
                />
              </div>
              <button onClick={handleAdd} className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition flex items-center shadow-sm hover:shadow whitespace-nowrap">
                <i data-lucide="plus" className="w-4 h-4 mr-2"></i> Add Book
              </button>
            </div>
          </div>
          <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <table className="min-w-full divide-y divide-gray-200">
              <thead className="bg-gray-50">
                <tr>
                  <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Title</th>
                  <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Author</th>
                  <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Category</th>
                  <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                  <th className="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                </tr>
              </thead>
              <tbody className="bg-white divide-y divide-gray-200">
                {filteredBooks.length === 0 && (
                  <tr><td colSpan="5" className="px-6 py-8 text-center text-gray-500">No books found.</td></tr>
                )}
                {filteredBooks.map(book => (
                  <tr key={book.id} className="hover:bg-gray-50 transition colors">
                    <td className="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{book.title}</td>
                    <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{book.author}</td>
                    <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{book.category}</td>
                    <td className="px-6 py-4 whitespace-nowrap">
                      <span className={`px-2 inline-flex text-xs leading-5 font-semibold rounded-full flex items-center mr-auto w-fit ${book.status === 'Available' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`}>
                        {book.status === 'Available' ? <i data-lucide="check-circle" className="w-3 h-3 mr-1"></i> : <i data-lucide="clock" className="w-3 h-3 mr-1"></i>}
                        {book.status}
                      </span>
                    </td>
                    <td className="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                      <button onClick={() => handleEdit(book)} className="text-blue-600 hover:text-blue-900 mr-4 transition" title="Edit">
                        <i data-lucide="edit-2" className="w-4 h-4"></i>
                      </button>
                      <button onClick={() => handleDelete(book.id)} className="text-red-600 hover:text-red-900 transition" title="Delete">
                        <i data-lucide="trash-2" className="w-4 h-4"></i>
                      </button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function Members({ members, setMembers }) {
      return (
        <div className="animate-fade-in">
          <div className="flex justify-between items-center mb-6">
            <h1 className="text-2xl font-bold text-gray-900">Members List</h1>
          </div>
          <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <table className="min-w-full divide-y divide-gray-200">
              <thead className="bg-gray-50">
                <tr>
                  <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
                  <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
                  <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Join Date</th>
                </tr>
              </thead>
              <tbody className="bg-white divide-y divide-gray-200">
                {members.map(member => (
                  <tr key={member.id} className="hover:bg-gray-50 transition colors">
                    <td className="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">
                      <div className="flex items-center">
                        <div className="h-8 w-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 font-bold mr-3">
                          {member.name.charAt(0)}
                        </div>
                        {member.name}
                      </div>
                    </td>
                    <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{member.email}</td>
                    <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{member.joinDate}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function LoanForm({ books, session, onSubmit, onCancel }) {
      const [formData, setFormData] = useState({ bookId: '' });
      const [searchBookQuery, setSearchBookQuery] = useState('');

      const availableBooks = books.filter(b => b.status === 'Available');
      const filteredBooks = availableBooks.filter(b =>
        b.title.toLowerCase().includes(searchBookQuery.toLowerCase()) ||
        b.author.toLowerCase().includes(searchBookQuery.toLowerCase())
      );

      const handleSubmit = (e) => {
        e.preventDefault();
        onSubmit({
          bookId: parseInt(formData.bookId),
          memberId: session.id,
          loanDate: new Date().toISOString().split('T')[0],
          returnDate: null
        });
      };

      return (
        <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 animate-fade-in max-w-2xl">
          <h2 className="text-xl font-bold text-gray-900 mb-6">New Loan</h2>
          {availableBooks.length === 0 ? (
            <div className="text-center py-6">
              <i data-lucide="alert-circle" className="w-12 h-12 text-orange-400 mx-auto mb-3"></i>
              <p className="text-gray-500">No books available for loan right now.</p>
              <button type="button" onClick={onCancel} className="mt-4 px-4 py-2 bg-gray-100 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-200 transition shadow-sm">Go Back</button>
            </div>
          ) : (
            <form onSubmit={handleSubmit} className="space-y-5">
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">Select Book</label>
                <div className="relative mb-2">
                  <i data-lucide="search" className="w-4 h-4 absolute left-3 top-3 text-gray-400"></i>
                  <input
                    type="text"
                    placeholder="Cari judul atau penulis buku..."
                    value={searchBookQuery}
                    onChange={(e) => setSearchBookQuery(e.target.value)}
                    className="w-full pl-9 pr-4 py-2 border border-gray-300 rounded-lg text-sm focus:border-blue-500 focus:ring-blue-500 outline-none transition"
                  />
                </div>
                <select required size="4" value={formData.bookId} onChange={e => setFormData({ ...formData, bookId: e.target.value })} className="block w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2.5 border outline-none transition cursor-pointer">
                  <option value="" disabled className="text-gray-500">-- Pilih Buku dari Daftar --</option>
                  {filteredBooks.map(book => (
                    <option key={book.id} value={book.id} className="p-2 border-b border-gray-50 last:border-0">{book.title} (by {book.author})</option>
                  ))}
                </select>
                {filteredBooks.length === 0 && <p className="text-sm text-red-500 mt-2">Buku tidak ditemukan.</p>}
              </div>
              <div className="bg-blue-50 p-4 rounded-lg flex flex-col border border-blue-100">
                <span className="text-sm font-medium text-blue-800 mb-1">Peminjam</span>
                <span className="font-semibold text-gray-900">{session.name} <span className="font-normal text-gray-500">({session.email})</span></span>
              </div>

              <div className="flex justify-end space-x-3 pt-4">
                <button type="button" onClick={onCancel} className="px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 transition shadow-sm">Cancel</button>
                <button type="submit" className="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition shadow-sm">Record Loan</button>
              </div>
            </form>
          )}
        </div>
      );
    }

    function Loans({ loans, setLoans, books, setBooks, members, session, showNotification }) {
      const [isFormOpen, setIsFormOpen] = useState(false);
      const [searchQuery, setSearchQuery] = useState('');

      const handleAddLoan = async (loanData) => {
        const { data: newLoan, error } = await supabase.from('loans').insert([loanData]).select().single();
        if (newLoan) {
          setLoans([...loans, newLoan]);
          await supabase.from('books').update({ status: 'Borrowed' }).eq('id', loanData.bookId);
          setBooks(books.map(b => b.id === loanData.bookId ? { ...b, status: 'Borrowed' } : b));
          showNotification('Buku berhasil dipinjam!', 'success');
        }
        setIsFormOpen(false);
      };

      const handleReturnBook = async (loan) => {
        const loanDateObj = new Date(loan.loanDate);
        const today = new Date();
        const diffTime = today - loanDateObj;
        const diffDays = Math.max(0, Math.floor(diffTime / (1000 * 60 * 60 * 24)));
        const fine = diffDays > 7 ? (diffDays - 7) * 500 : 0;

        const confirmMsg = fine > 0
          ? `Buku ini terlambat lebih dari 7 hari! Denda: Rp ${fine.toLocaleString('id-ID')}\nKonfirmasi pengembalian?`
          : 'Konfirmasi pengembalian buku?';

        if (confirm(confirmMsg)) {
          const returnDate = new Date().toISOString().split('T')[0];
          await supabase.from('loans').update({ returnDate }).eq('id', loan.id);
          await supabase.from('books').update({ status: 'Available' }).eq('id', loan.bookId);

          setLoans(loans.map(l => l.id === loan.id ? { ...l, returnDate } : l));
          setBooks(books.map(b => b.id === loan.bookId ? { ...b, status: 'Available' } : b));

          if (fine > 0) {
            showNotification(`Buku dikembalikan. Terkena denda sebesar Rp ${fine.toLocaleString('id-ID')}`, 'warning');
          } else {
            showNotification('Buku berhasil dikembalikan!', 'success');
          }
        }
      };

      useEffect(() => {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      });

      if (isFormOpen) {
        return (
          <div className="animate-fade-in">
            <button onClick={() => setIsFormOpen(false)} className="mb-4 flex items-center text-sm font-medium text-gray-500 hover:text-gray-900 transition">
              <i data-lucide="arrow-left" className="w-4 h-4 mr-1"></i> Back to Loans
            </button>
            <LoanForm books={books} session={session} onSubmit={handleAddLoan} onCancel={() => setIsFormOpen(false)} />
          </div>
        );
      }

      const activeLoans = loans.filter(l => !l.returnDate);
      const filteredLoans = activeLoans.filter(loan => {
        const book = books.find(b => b.id === loan.bookId) || { title: '' };
        const member = members.find(m => m.id === loan.memberId) || { name: '' };
        const query = searchQuery.toLowerCase();
        return book.title.toLowerCase().includes(query) || member.name.toLowerCase().includes(query);
      });

      return (
        <div className="animate-fade-in">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
            <h1 className="text-2xl font-bold text-gray-900">Active Loans</h1>
            <div className="flex gap-3 w-full md:w-auto">
              <div className="relative flex-1 md:w-64">
                <i data-lucide="search" className="w-4 h-4 absolute left-3 top-3 text-gray-400"></i>
                <input
                  type="text"
                  placeholder="Cari buku atau peminjam..."
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                  className="w-full pl-9 pr-4 py-2 border border-gray-300 rounded-lg text-sm focus:border-blue-500 focus:ring-blue-500 outline-none"
                />
              </div>
              <button onClick={() => setIsFormOpen(true)} className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition flex items-center shadow-sm hover:shadow whitespace-nowrap">
                <i data-lucide="plus" className="w-4 h-4 mr-2"></i> New Loan
              </button>
            </div>
          </div>
          <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <table className="min-w-full divide-y divide-gray-200">
              <thead className="bg-gray-50">
                <tr>
                  <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Book</th>
                  <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Member</th>
                  <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Loan Date</th>
                  <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                  <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Denda</th>
                  <th className="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                </tr>
              </thead>
              <tbody className="bg-white divide-y divide-gray-200">
                {filteredLoans.length === 0 && (
                  <tr><td colSpan="6" className="px-6 py-8 text-center text-gray-500">No matching loans found.</td></tr>
                )}
                {filteredLoans.map(loan => {
                  const book = books.find(b => b.id === loan.bookId) || { title: 'Unknown Book' };
                  const member = members.find(m => m.id === loan.memberId) || { name: 'Unknown Member' };

                  const loanDateObj = new Date(loan.loanDate);
                  const today = new Date();
                  const diffTime = today - loanDateObj;
                  const diffDays = Math.max(0, Math.floor(diffTime / (1000 * 60 * 60 * 24)));
                  const fine = diffDays > 7 ? (diffDays - 7) * 500 : 0;

                  return (
                    <tr key={loan.id} className="hover:bg-gray-50 transition colors">
                      <td className="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{book.title}</td>
                      <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{member.name}</td>
                      <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{loan.loanDate}</td>
                      <td className="px-6 py-4 whitespace-nowrap">
                        <span className="px-2 inline-flex text-xs leading-5 font-semibold rounded-full flex items-center mr-auto w-fit bg-orange-100 text-orange-800">
                          Active
                        </span>
                      </td>
                      <td className="px-6 py-4 whitespace-nowrap">
                        <span className={`px-2 inline-flex text-xs leading-5 font-semibold rounded-full flex items-center mr-auto w-fit ${fine > 0 ? 'bg-red-100 text-red-800' : 'bg-gray-100 text-gray-800'}`}>
                          Rp {fine.toLocaleString('id-ID')}
                        </span>
                      </td>
                      <td className="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                        <button onClick={() => handleReturnBook(loan)} className="text-blue-600 hover:text-blue-900 transition flex items-center justify-end w-full" title="Mark as Returned">
                          <i data-lucide="corner-down-left" className="w-4 h-4 mr-1"></i> Mark as Returned
                        </button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function AuthScreen({ onLogin }) {
      const [isLogin, setIsLogin] = useState(true);
      const [formData, setFormData] = useState({ name: '', email: '', password: '' });
      const [error, setError] = useState('');

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');

        if (isLogin) {
          const { data, error: fetchError } = await supabase
            .from('members')
            .select('*')
            .eq('email', formData.email)
            .eq('name', formData.name)
            .eq('password', formData.password)
            .single();

          if (fetchError || !data) {
            setError('Detail login tidak cocok!');
          } else {
            onLogin(data);
          }
        } else {
          const { data: existing } = await supabase.from('members').select('id').eq('email', formData.email).maybeSingle();
          if (existing) {
            setError('Email sudah terdaftar!');
            return;
          }

          const memberData = {
            name: formData.name,
            email: formData.email,
            password: formData.password,
            joinDate: new Date().toISOString().split('T')[0]
          };

          const { data, error: insertError } = await supabase.from('members').insert([memberData]).select().single();
          if (insertError || !data) {
            setError('Gagal mendaftar!');
          } else {
            onLogin(data);
          }
        }
      };

      return (
        <div className="flex items-center justify-center min-h-screen bg-gray-50 p-4">
          <div className="w-full max-w-md bg-white rounded-xl shadow-lg border border-gray-100 p-8 animate-fade-in">
            <div className="flex justify-center mb-6 text-blue-600">
              <i data-lucide="library" className="w-12 h-12"></i>
            </div>
            <h2 className="text-2xl font-bold text-center text-gray-900 mb-8">
              {isLogin ? 'Masuk ke Book Labour' : 'Daftar Member Baru'}
            </h2>

            {error && (
              <div className="bg-red-50 text-red-600 p-3 rounded-lg text-sm mb-6 flex items-center">
                <i data-lucide="alert-circle" className="w-4 h-4 mr-2"></i> {error}
              </div>
            )}

            <form onSubmit={handleSubmit} className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap</label>
                <input required type="text" value={formData.name} onChange={e => setFormData({ ...formData, name: e.target.value })} className="block w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2.5 border outline-none transition" placeholder="e.g. Budi Santoso" />
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input required type="email" value={formData.email} onChange={e => setFormData({ ...formData, email: e.target.value })} className="block w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2.5 border outline-none transition" placeholder="e.g. budi@example.com" />
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">Sandi</label>
                <input required type="password" value={formData.password} onChange={e => setFormData({ ...formData, password: e.target.value })} className="block w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm p-2.5 border outline-none transition" placeholder="••••••••" />
              </div>

              <button type="submit" className="w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition shadow-sm mt-4">
                {isLogin ? 'Masuk' : 'Daftar & Masuk'}
              </button>
            </form>

            <div className="mt-6 text-center text-sm text-gray-600">
              {isLogin ? "Belum punya akun?" : "Sudah jadi member?"}{' '}
              <button type="button" onClick={() => { setIsLogin(!isLogin); setError(''); }} className="text-blue-600 hover:text-blue-800 font-medium transition">
                {isLogin ? 'Daftar sekarang' : 'Masuk di sini'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [session, setSession] = useState(() => {
        const saved = localStorage.getItem('bookLabourSession');
        return saved ? JSON.parse(saved) : null;
      });
      const [currentMenu, setCurrentMenu] = useState('dashboard');

      useEffect(() => {
        if (session) {
          localStorage.setItem('bookLabourSession', JSON.stringify(session));
        } else {
          localStorage.removeItem('bookLabourSession');
        }
      }, [session]);
      const [books, setBooks] = useState([]);
      const [members, setMembers] = useState([]);
      const [loans, setLoans] = useState([]);
      const [notification, setNotification] = useState(null);

      const showNotification = (message, type = 'success') => {
        setNotification({ message, type });
        setTimeout(() => setNotification(null), 3500);
      };

      useEffect(() => {
        if (!session) return;
        const fetchData = async () => {
          const { data: bData } = await supabase.from('books').select('*').order('id');
          const { data: mData } = await supabase.from('members').select('*').order('id');
          const { data: lData } = await supabase.from('loans').select('*').order('id');

          if (bData) setBooks(bData);
          if (mData) setMembers(mData);
          if (lData) setLoans(lData);
        };
        fetchData();
      }, [session]);

      useEffect(() => {
        // Initialize lucide icons
        if (window.lucide) {
          window.lucide.createIcons();
        }
      });

      const renderContent = () => {
        if (currentMenu === 'dashboard') return <Dashboard books={books} members={members} />;
        if (currentMenu === 'books') return <Books books={books} setBooks={setBooks} />;
        if (currentMenu === 'members') return <Members members={members} setMembers={setMembers} />;
        if (currentMenu === 'loans') return <Loans loans={loans} setLoans={setLoans} books={books} setBooks={setBooks} members={members} session={session} showNotification={showNotification} />;
      };

      if (!session) {
        return <AuthScreen onLogin={setSession} />;
      }

      return (
        <div className="flex min-h-screen bg-gray-50 font-sans">
          <Sidebar currentMenu={currentMenu} setCurrentMenu={setCurrentMenu} onLogout={() => setSession(null)} />
          <main className="ml-64 flex-1 p-8">
            <div className="max-w-5xl mx-auto mt-4">
              {renderContent()}
            </div>
          </main>

          {notification && (
            <div className={`fixed bottom-6 right-6 p-4 rounded-xl shadow-lg flex items-center animate-fade-in z-50 transition-all transform duration-300 ${notification.type === 'success' ? 'bg-green-600 text-white' : notification.type === 'warning' ? 'bg-orange-600 text-white' : 'bg-red-600 text-white'}`}>
              <i data-lucide={notification.type === 'success' ? 'check-circle' : notification.type === 'warning' ? 'alert-circle' : 'info'} className="w-5 h-5 mr-3"></i>
              <span className="font-medium text-sm">{notification.message}</span>
            </div>
          )}

          <style dangerouslySetInnerHTML={{
            __html: `
            @keyframes fadeIn {
              from { opacity: 0; transform: translateY(10px); }
              to { opacity: 1; transform: translateY(0); }
            }
            .animate-fade-in {
              animation: fadeIn 0.3s ease-out forwards;
            }
          `}} />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
